<!-- contact -->
 <section class="contact-section" id="contact">
  <div class="contact-inner">
    <div class="contact-left">
      <h2 class="contact-title">문의하기</h2>
      <p class="contact-subtitle">함께 만들 다음 스토리를 기다리고 있습니다.</p>

      <form class="contact-box" id="contact-form">
        <div class="contact-form-row">
          <label for="company">회사명</label>
          <input type="text" id="company" name="company" required placeholder="회사명"/>
        </div>

        <div class="contact-form-row">
          <label for="name">이름</label>
          <input type="text" id="name" name="name" required placeholder="이름" />
        </div>

        <div class="contact-form-row">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" required placeholder="이메일"/>
        </div>

        <div class="contact-form-row">
          <label for="phone">전화번호</label>
          <input type="text" id="phone" name="phone" required placeholder="전화번호"/>
        </div>

        <div class=" contact-form-row contact-form-row--textarea">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" placeholder="프로젝트 협업, 채용 문의 등 편하게 남겨주세요."></textarea>
        </div>
        
        <button type="submit" class="contact-submit">제출</button>
      </form>
    </div>

    <div class="contact-right">
      <div class="contact-info-list">
        <div class="contact-info-item">
          <span class="contact-info-label">전화번호</span>
          <span class="contact-info-value">010-9293-9129</span>
        </div>

        <div class="contact-info-item">
          <span class="contact-info-label">이메일</span>
          <span class="contact-info-value">hilarytang316@gmail.com</span>
        </div>

        <div class="contact-info-item">
          <span class="contact-info-label">카카오톡</span>
          <span class="contact-info-value">mnahyunn</span>
        </div>

        <div class="contact-info-item">

        </div>

        <div class="contact-info-item">
          <span class="contact-info-label">Behance</span>
          <span class="contact-info-value">mnahyunn</span>
        </div>
      </div>
