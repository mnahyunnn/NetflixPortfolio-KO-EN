<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <title>Netflix | Hilary Tang Portfolio</title>
    <link
    rel="stylesheet"
    as="style"
    crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
  />
  
    <!-- remixicon cdn -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.min.css" rel="stylesheet">

    <!-- CSS link -->
    <style>
      :root {
  --bg: #000000;
  --text: #ffffff;
  --muted: #b3b3b3;
  --button-border: #808080;
  --button-hover: #ffffff;
  --button-hover-text: #000000;
  --image-size: 192px;
  --image-radius: 3px;
  --title-size: 67px;
  --name-size: 20px;
  --button-font-size: 26px;
  --profile-gap-from-title: 45px;
  --button-gap-from-profiles: 100px;
  --profile-gap: 32px;
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* LOGIN PAGE */
#loginPage {
  width: 100%;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  background: #000;
  opacity: 1;
  visibility: visible;
}

.page {
  width: 100%;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding-top: 220px;
  background: #000;
}

.content {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.title {
  margin: 0;
  font-size: var(--title-size);
  font-weight: 400;
  line-height: 1.15;
  letter-spacing: -0.02em;
  text-align: center;
}

.profiles {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: var(--profile-gap);
  margin-top: var(--profile-gap-from-title);
  flex-wrap: nowrap;
}

.profile-box {
  width: 192px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  color: #ffffff;
  cursor: pointer;
}

.profile-image {
  width: var(--image-size);
  height: var(--image-size);
  border-radius: var(--image-radius);
  background: #1b1b1b;
  border: 1px solid #2b2b2b;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #8e8e8e;
  font-size: 24px;
  font-weight: 500;
  text-transform: lowercase;
  overflow: hidden;
  transition: transform 0.2s ease, border-color 0.2s ease;
}

.profile-image img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.profile-box:hover .profile-image {
  transform: scale(1.02);
  border-color: #ffffff;
}

.profile-name {
  margin-top: 16px;
  font-size: var(--name-size);
  font-weight: 500;
  line-height: 1.2;
  text-align: center;
  white-space: nowrap;
}

.manage-button {
  width: 271px;
  height: 52px;
  margin-top: var(--button-gap-from-profiles);
  border: 1px solid var(--button-border);
  background: transparent;
  color: var(--text);
  font-size: var(--button-font-size);
  font-weight: 400;
  font-family: inherit;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.manage-button:hover {
  background: var(--button-hover);
  color: var(--button-hover-text);
  border-color: var(--button-hover);
}

/* Intro removed */
#intro {
  display: none;
}

#introVideo {
  display: none;
}

@media (max-width: 1440px) {
  .profiles {
    gap: 24px;
  }

  .profile-image,
  .profile-box {
    width: 172px;
  }

  .profile-image {
    height: 172px;
  }
}

@media (max-width: 1200px) {
  .page {
    padding-top: 140px;
  }

  .title {
    font-size: 52px;
  }

  .profiles {
    flex-wrap: wrap;
    max-width: 900px;
  }
}

@media (max-width: 768px) {
  .page {
    padding: 80px 24px;
  }

  .title {
    font-size: 38px;
  }

  .profiles {
    gap: 20px;
  }

  .profile-box,
  .profile-image {
    width: 140px;
  }

  .profile-image {
    height: 140px;
  }

  .profile-name {
    font-size: 18px;
  }

  .manage-button {
    width: 220px;
    font-size: 22px;
  }
}
    </style>
    
</head>
<body>


  <!-- Login Page -->
  <div id="loginPage">
    <main class="page">
    <section class="content">
      <h1 class="title">Who’s watching?</h1>

      <div class="profiles">

        <a href="hr-en.html" class="profile-box" aria-label="채용자 프로필" data-profile-name="채용자" data-profile-image="images/hr.png">
          <div class="profile-image"><img src="images/hr.png" alt="채용자"></div>
          <div class="profile-name">Recruitor</div>
        </a>

        <a href="ceo-en.html" class="profile-box" aria-label="대표님 프로필" data-profile-name="대표님" data-profile-image="images/ceo.png">
          <div class="profile-image"><img src="images/ceo.png" alt="대표님"></div>
          <div class="profile-name">CEO</div>
        </a>

        <a href="edit-en.html" class="profile-box" aria-label="문아현 프로필" data-profile-name="문아현" data-profile-image="images/me.png">
          <div class="profile-image"><img src="images/me.png" alt="문아현"></div>
          <div class="profile-name">Hilary</div>
        </a>

        <a href="stalker-en.html" class="profile-box" aria-label="스토커 프로필" data-profile-name="스토커" data-profile-image="images/stalker.png">
          <div class="profile-image"><img src="images/stalker.png" alt="스토커"></div>
          <div class="profile-name">Stalker</div>
        </a>

        <a href="dog-en.html" class="profile-box" aria-label="강아지 프로필" data-profile-name="강아지" data-profile-image="images/dogg.png">
          <div class="profile-image"><img src="images/dogg.png" alt="강아지"></div>
          <div class="profile-name">Shermo</div>
        </a>
      </div>

         <button class="manage-button" type="button"><a href="loginpage.html" style="color: #fff; text-decoration: none; font-size: 20px; display: flex; justify-content: center;">한국어로 전환</a></button>
    </section>
  </main>
  </div>
  
</body>

</html>
</body>
</html>
