<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <title>Netflix | 문아현 포트폴리오</title>
<link
    rel="stylesheet"
    as="style"
    crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
  />
  
    <!-- remixicon cdn -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.min.css" rel="stylesheet">

    <!-- CSS link -->
    <link rel="stylesheet" href="css/login.css">
    
</head>
<body>


  <!-- Login Page -->
  <div id="loginPage">
    <main class="page">
    <section class="content">
      <h1 class="title">Who’s watching?</h1>

      <div class="profiles">

        <a href="hr.html" class="profile-box" aria-label="채용자 프로필" data-profile-name="채용자" data-profile-image="images/hr.png">
          <div class="profile-image"><img src="images/hr.png" alt="채용자"></div>
          <div class="profile-name">채용 담당자님</div>
        </a>

        <a href="ceo.html" class="profile-box" aria-label="대표님 프로필" data-profile-name="대표님" data-profile-image="images/ceo.png">
          <div class="profile-image"><img src="images/ceo.png" alt="대표님"></div>
          <div class="profile-name">대표님</div>
        </a>

        <a href="edit.html" class="profile-box" aria-label="문아현 프로필" data-profile-name="문아현" data-profile-image="images/me.png">
          <div class="profile-image"><img src="images/me.png" alt="문아현"></div>
          <div class="profile-name">문아현</div>
        </a>

        <a href="stalker.html" class="profile-box" aria-label="스토커 프로필" data-profile-name="스토커" data-profile-image="images/stalker.png">
          <div class="profile-image"><img src="images/stalker.png" alt="스토커"></div>
          <div class="profile-name">스토커</div>
        </a>

        <a href="dog.html" class="profile-box" aria-label="강아지 프로필" data-profile-name="강아지" data-profile-image="images/dogg.png">
          <div class="profile-image"><img src="images/dogg.png" alt="강아지"></div>
          <div class="profile-name">우리집 강아지</div>
        </a>
      </div>

      <button class="manage-button" type="button"><a href="loginpage-en.html" style="color: #fff; text-decoration: none; font-size: 20px; display: flex; justify-content: center;">Switch to English</a></button>
    </section>
  </main>
  </div>
  <div id="intro">
  <video id="introVideo" autoplay muted playsinline>
    <source src="starter.mp4" type="video/mp4">
  </video>
</div>
</body>

<script>
    const intro = document.getElementById("intro");
    const introVideo = document.getElementById("introVideo");
    const loginPage = document.getElementById("loginPage");

    let hasTransitioned = false;

    function revealLogin() {
      if (hasTransitioned) return;
      hasTransitioned = true;
      loginPage.classList.add("reveal");
      intro.classList.add("fade-out");
    }

    introVideo.addEventListener("timeupdate", () => {
      if (!introVideo.duration || hasTransitioned) return;

      const remaining = introVideo.duration - introVideo.currentTime;

      /* start overlap before video fully ends */
      if (remaining <= 0.8) {
        revealLogin();
      }
    });

    introVideo.addEventListener("ended", revealLogin);
    introVideo.addEventListener("error", revealLogin);

    /* fallback */
    setTimeout(() => {
      if (introVideo.readyState === 0) {
        revealLogin();
      }
    }, 2500);

   
  const profileLinks = document.querySelectorAll(".profile-box");

  profileLinks.forEach((profileLink) => {
    profileLink.addEventListener("click", (event) => {
      event.preventDefault();

      const selectedProfile = {
        name: profileLink.dataset.profileName,
        image: profileLink.dataset.profileImage
      };

      localStorage.setItem("selectedProfile", JSON.stringify(selectedProfile));

      window.location.href = profileLink.href;
    });
  });

  </script>
</html>
</body>
</html>
