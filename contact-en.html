<!-- contact -->
 <section class="contact-section" id="contact">
  <div class="contact-inner">
    <div class="contact-left">
      <h2 class="contact-title">Contact</h2>
      <p class="contact-subtitle">Looking forward to creating the next story together!</p>

      <form class="contact-box" id="contact-form">
        <div class="contact-form-row">
          <label for="company">Company</label>
          <input type="text" id="company" name="company" required placeholder="Company Name"/>
        </div>

        <div class="contact-form-row">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required placeholder="Name" />
        </div>

        <div class="contact-form-row">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="Email Address"/>
        </div>

        <div class="contact-form-row">
          <label for="phone">Phone</label>
          <input type="text" id="phone" name="phone" required placeholder="Phone Number"/>
        </div>

        <div class=" contact-form-row contact-form-row--textarea">
          <label for="message">Your Story</label>
          <textarea id="message" name="message" placeholder="Every project has a story. Tell me yours."></textarea>
        </div>
        
        <button type="submit" class="contact-submit">Submit</button>
      </form>
    </div>

    <div class="contact-right">
      <div class="contact-info-list">
        <div class="contact-info-item">
          <span class="contact-info-label">Phone</span>
          <span class="contact-info-value">010-9293-9129</span>
        </div>

        <div class="contact-info-item">
          <span class="contact-info-label">Email</span>
          <span class="contact-info-value">hilarytang316@gmail.com</span>
        </div>

        <div class="contact-info-item">
          <span class="contact-info-label">KakaoTalk</span>
          <span class="contact-info-value">mnahyunn</span>
        </div>

        <div class="contact-info-item">
          <span class="contact-info-label">Instagram</span>
          <span class="contact-info-value">mnahyunn</span>
        </div>

        <div class="contact-info-item">
          <span class="contact-info-label">Behance</span>
          <span class="contact-info-value">mnahyunn</span>
        </div>
      </div>

      <img src="images/ahyunlogo.png" alt="Ahyun Logo" class="contact-logo" />
      
    </div>
